<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrimônio Imobiliário</title>
<style>
  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --surface2: #F0EEE9;
    --border: #E2DED6;
    --border2: #C8C4BC;
    --text: #1A1916;
    --text2: #6B6860;
    --text3: #9B9890;
    --accent: #1B4F3A;
    --accent-light: #E8F0EC;
    --accent2: #2D7A57;
    --danger: #C0392B;
    --danger-light: #FDECEA;
    --warning: #B7770D;
    --warning-light: #FEF3DC;
    --success: #1B6B3A;
    --success-light: #E6F4ED;
    --radius: 10px;
    --radius-sm: 6px;
    --mono: 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

  /* Layout */
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; min-height: 100vh; background: var(--accent); display: flex; flex-direction: column; padding: 0; flex-shrink: 0; }
  .sidebar-logo { padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .sidebar-logo h1 { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
  .sidebar-logo p { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .sidebar-nav { flex: 1; padding: 12px 0; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; font-size: 13px; color: rgba(255,255,255,0.65); cursor: pointer; transition: all 0.15s; border-left: 3px solid transparent; }
  .nav-item:hover { color: #fff; background: rgba(255,255,255,0.08); }
  .nav-item.active { color: #fff; background: rgba(255,255,255,0.12); border-left-color: #fff; }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .sidebar-bottom { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); }
  .gist-status { font-size: 11px; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 6px; }
  .gist-dot { width: 6px; height: 6px; border-radius: 50%; background: #6ee7b7; }
  .gist-dot.off { background: rgba(255,255,255,0.3); }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 28px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .topbar-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .content { flex: 1; padding: 28px; overflow-y: auto; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary { background: var(--surface); border: 1px solid var(--border2); color: var(--text); }
  .btn-secondary:hover { background: var(--surface2); }
  .btn-ghost { background: transparent; border: 1px solid transparent; color: var(--text2); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { background: var(--danger-light); border: 1px solid #f5c6c2; color: var(--danger); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn svg { width: 14px; height: 14px; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }

  /* Metric cards */
  .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
  .metric-label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .metric-value { font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.5px; }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .metric-pos { color: var(--success); }
  .metric-neg { color: var(--danger); }
  .metric-warn { color: var(--warning); }

  /* Tags / badges */
  .tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .tag-ok { background: var(--success-light); color: var(--success); }
  .tag-warn { background: var(--warning-light); color: var(--warning); }
  .tag-danger { background: var(--danger-light); color: var(--danger); }
  .tag-info { background: var(--accent-light); color: var(--accent); }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); background: var(--surface2); }
  td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .td-right { text-align: right; }
  .td-mono { font-family: var(--mono); font-size: 12px; }

  /* Forms */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-full { grid-column: 1 / -1; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12px; font-weight: 500; color: var(--text2); }
  .form-group input, .form-group select, .form-group textarea {
    padding: 9px 12px; border: 1px solid var(--border2); border-radius: var(--radius-sm);
    font-size: 13px; color: var(--text); background: var(--surface); outline: none;
    transition: border-color 0.15s; font-family: inherit;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px var(--accent-light); }
  .form-hint { font-size: 11px; color: var(--text3); }

  /* Bar */
  .bar-wrap { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-top: 4px; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .bar-ok { background: var(--accent2); }
  .bar-warn { background: var(--warning); }
  .bar-danger { background: var(--danger); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal { background: var(--surface); border-radius: var(--radius); width: 100%; max-width: 620px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-header h2 { font-size: 16px; font-weight: 600; }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

  /* Section */
  .section-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* Alert */
  .alert { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; }
  .alert-info { background: var(--accent-light); color: var(--accent); border: 1px solid #b8d9cb; }
  .alert-warn { background: var(--warning-light); color: var(--warning); border: 1px solid #f5dfa0; }

  /* Charts */
  .chart-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .chart-bar-label { font-size: 12px; color: var(--text2); width: 160px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chart-bar-track { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .chart-bar-fill { height: 100%; border-radius: 4px; }
  .chart-bar-value { font-size: 12px; font-weight: 500; width: 60px; text-align: right; flex-shrink: 0; font-family: var(--mono); }

  /* Amortization table */
  .amort-header { display: grid; grid-template-columns: 50px 1fr 1fr 1fr 1fr; gap: 8px; padding: 8px 12px; background: var(--surface2); border-radius: var(--radius-sm) var(--radius-sm) 0 0; font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
  .amort-row { display: grid; grid-template-columns: 50px 1fr 1fr 1fr 1fr; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 12px; font-family: var(--mono); }
  .amort-row:last-child { border-bottom: none; }
  .amort-row:hover { background: var(--surface2); }

  /* Gist config */
  .config-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; max-width: 500px; margin: 0 auto; }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }
  .empty h3 { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .empty p { font-size: 13px; color: var(--text2); margin-bottom: 20px; }

  /* Tabs */
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab { padding: 10px 16px; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .hidden { display: none !important; }
  .flex { display: flex; }
  .gap-8 { gap: 8px; }
  .gap-12 { gap: 12px; }
  .mt-4 { margin-top: 4px; }
  .mt-12 { margin-top: 12px; }
  .mt-16 { margin-top: 16px; }
  .mt-20 { margin-top: 20px; }
  .mb-16 { margin-bottom: 16px; }
  .text-right { text-align: right; }
  .text-mono { font-family: var(--mono); }
  .fw-600 { font-weight: 600; }
  .color-success { color: var(--success); }
  .color-danger { color: var(--danger); }
  .color-warn { color: var(--warning); }
  .color-muted { color: var(--text2); }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <h1>Patrimônio</h1>
      <p>Gestão imobiliária</p>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item active" onclick="showPage('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Painel geral
      </div>

        Imóveis
      </div>
      <div class="nav-item" onclick="showPage('financiamento')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>

        Análise
      </div>
      <div class="nav-item" onclick="showPage('config')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="page-title">Painel geral</span>
      <div class="topbar-actions" id="topbar-actions"></div>

    <div class="content" id="content"></div>

</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {
  imoveis: [],
  lancamentos: [],
  gistToken: '',
  gistId: '',
  currentPage: 'dashboard'
};

// ─── PERSISTENCE ─────────────────────────────────────────────────────────────
function saveLocal() {
  localStorage.setItem('patrimonio_state', JSON.stringify(state));
}

function loadLocal() {
  const s = localStorage.getItem('patrimonio_state');
  if (s) {
    try { state = { ...state, ...JSON.parse(s) }; } catch(e) {}
  }
}

async function saveGist() {
  if (!state.gistToken || !state.gistId) return;
  const data = { imoveis: state.imoveis, lancamentos: state.lancamentos };
  try {
    await fetch(`https://api.github.com/gists/${state.gistId}`, {
      method: 'PATCH',
      headers: { Authorization: `token ${state.gistToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { 'patrimonio.json': { content: JSON.stringify(data, null, 2) } } })
    });
  } catch(e) { console.error('Gist save error', e); }
}

async function loadGist() {
  if (!state.gistToken || !state.gistId) {
    console.warn('loadGist: token ou gistId ausente', { token: !!state.gistToken, gistId: state.gistId });
    return false;
  }
  try {
    const r = await fetch(`https://api.github.com/gists/${state.gistId}`, {
      headers: { Authorization: `token ${state.gistToken}` }
    });
    if (!r.ok) {
      console.error('loadGist: erro HTTP', r.status, r.statusText);
      return false;
    }
    const gist = await r.json();
    const content = gist.files['patrimonio.json']?.content;
    if (content) {
      const data = JSON.parse(content);
      state.imoveis = data.imoveis || [];
      state.lancamentos = data.lancamentos || [];
      saveLocal();
    }
    updateGistStatus();
    return true;
  } catch(e) {
    console.error('loadGist: exceção', e);
    return false;
  }
}

async function createGist(token) {
  const r = await fetch('https://api.github.com/gists', {
    method: 'POST',
    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      description: 'Patrimônio Imobiliário - dados privados',
      public: false,
      files: { 'patrimonio.json': { content: JSON.stringify({ imoveis: [], lancamentos: [] }, null, 2) } }
    })
  });
  if (!r.ok) throw new Error('Token inválido ou sem permissão');
  const gist = await r.json();
  return gist.id;
}

function updateGistStatus() {
  const dot = document.getElementById('gist-dot');
  const txt = document.getElementById('gist-status-text');
  if (state.gistToken && state.gistId) {
    dot.classList.remove('off');
    txt.textContent = 'Gist conectado';
  } else {
    dot.classList.add('off');
    txt.textContent = 'Gist desconectado';
  }
}

// ─── SAVE (local + gist) ─────────────────────────────────────────────────────
function save() {
  saveLocal();
  saveGist();
}

// ─── FORMATTERS ──────────────────────────────────────────────────────────────
function fmtBRL(n) {
  if (n == null || isNaN(n)) return '—';
  return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 }).format(n);
}
function fmtPct(n, decimals = 1) {
  if (n == null || isNaN(n)) return '—';
  return n.toFixed(decimals) + '%';
}
function parseBRL(s) {
  if (!s) return 0;
  return parseFloat(s.toString().replace(/[^\d,.-]/g, '').replace(',', '.')) || 0;
}
function fmtDate(d) {
  if (!d) return '—';
  const [y, m] = d.split('-');
  return `${m}/${y}`;
}
function monthsBetween(d1, d2) {
  const a = new Date(d1), b = new Date(d2);
  return (b.getFullYear() - a.getFullYear()) * 12 + (b.getMonth() - a.getMonth());
}

// ─── FINANCE CALCS ───────────────────────────────────────────────────────────
// Modo Construtora: saldo = valor contrato - total pago (parcelas mensais + especiais)
// Modo Banco: saldo calculado por SAC/PRICE com base na taxa

function isConstrutora(imovel) {
  return imovel.financiamento?.tipo === 'construtora';
}

function calcParcelaSAC(saldo, taxaMensal, prazoMeses) {
  const amort = saldo / prazoMeses;
  const juros = saldo * taxaMensal;
  return { parcela: amort + juros, amort, juros };
}

function calcParcelaPrice(saldo, taxaMensal, prazoMeses) {
  if (taxaMensal === 0) return { parcela: saldo / prazoMeses, amort: saldo / prazoMeses, juros: 0 };
  const p = saldo * (taxaMensal * Math.pow(1 + taxaMensal, prazoMeses)) / (Math.pow(1 + taxaMensal, prazoMeses) - 1);
  return { parcela: p, amort: p - saldo * taxaMensal, juros: saldo * taxaMensal };
}

function gerarAmortizacao(imovel) {
  if (!imovel.financiamento) return [];
  if (isConstrutora(imovel)) return gerarAmortizacaoConstrutora(imovel);
  const { saldoDevedor, taxaJurosMensal, prazoMeses, sistema } = imovel.financiamento;
  const taxaM = (taxaJurosMensal || 0) / 100;
  const rows = [];
  let saldo = saldoDevedor;
  if (sistema === 'SAC') {
    const amortFixa = saldoDevedor / prazoMeses;
    for (let i = 1; i <= prazoMeses; i++) {
      const juros = saldo * taxaM;
      rows.push({ mes: i, parcela: amortFixa + juros, amort: amortFixa, juros, saldo });
      saldo = Math.max(0, saldo - amortFixa);
    }
  } else {
    const parcelaFixa = taxaM === 0
      ? saldoDevedor / prazoMeses
      : saldoDevedor * (taxaM * Math.pow(1 + taxaM, prazoMeses)) / (Math.pow(1 + taxaM, prazoMeses) - 1);
    for (let i = 1; i <= prazoMeses; i++) {
      const juros = saldo * taxaM;
      const amort = parcelaFixa - juros;
      rows.push({ mes: i, parcela: parcelaFixa, amort, juros, saldo });
      saldo = Math.max(0, saldo - amort);
    }
  }
  return rows;
}

// Para construtora: gera linhas com base nas parcelas pagas reais + projeção do restante
function gerarAmortizacaoConstrutora(imovel) {
  const fin = imovel.financiamento;
  const valorContrato = fin.valorContrato || imovel.precoAquisicao || 0;
  const entrada = fin.entrada || 0;
  const prazoMeses = fin.prazoMeses || 0;
  const taxaMensal = (fin.jurosCompensatorios != null && fin.jurosCompensatorios !== '' ? parseFloat(fin.jurosCompensatorios) : 1) / 100;
  const inicio = new Date((fin.dataInicio || imovel.dataAquisicao || getMesAtual()) + '-02');
  const pagas = imovel.parcelasMensaisPagas || {};
  const parcelaProjEstimada = fin.parcelaMensalEstimada || (valorContrato / Math.max(prazoMeses, 1));

  // Mapa de especiais por mês
  const especiaisPorMes = {};
  (imovel.parcelasEspeciais || []).forEach(p => {
    if (!especiaisPorMes[p.data]) especiaisPorMes[p.data] = [];
    especiaisPorMes[p.data].push(p);
  });

  const rows = [];
  let saldo = valorContrato - entrada;

  for (let i = 1; i <= prazoMeses; i++) {
    const d = new Date(inicio); d.setMonth(d.getMonth() + i - 1);
    const mesKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const pg = pagas[mesKey];
    const especiaisMes = especiaisPorMes[mesKey] || [];
    const totalEspeciaisMes = especiaisMes.reduce((s, e) => s + e.valor, 0);
    const especiaisMesPagas = especiaisMes.filter(e => e.pago).reduce((s, e) => s + e.valor, 0);

    if (pg) {
      // Pago: abate parcela mensal + especiais pagas do mês
      saldo = Math.max(0, saldo - pg.valorPago - especiaisMesPagas);
      rows.push({ mes: i, mesKey, parcela: pg.valorPago, jurosProjetados: 0,
        amort: pg.valorPago, saldoApos: saldo, pago: true, totalEspeciaisMes, especiaisMesPagas });
    } else {
      // Futuro: aplica juros, desconta parcela estimada + todas especiais do mês
      const juros = saldo * taxaMensal;
      saldo = Math.max(0, (saldo + juros) - parcelaProjEstimada - totalEspeciaisMes);
      rows.push({ mes: i, mesKey, parcela: parcelaProjEstimada, jurosProjetados: juros,
        amort: parcelaProjEstimada, saldoApos: saldo, pago: false, totalEspeciaisMes, especiaisMesPagas: 0 });
    }
  }
  return rows;
}

// Saldo devedor atual
function calcSaldoAtual(imovel) {
  if (!imovel.financiamento) return 0;
  if (isConstrutora(imovel)) return calcSaldoAtualConstrutora(imovel);
  const rows = gerarAmortizacao(imovel);
  const inicio = new Date((imovel.financiamento?.dataInicio || imovel.dataAquisicao || getMesAtual()) + '-02');
  const hoje = getHoje();
  const pagas = imovel.parcelasMensaisPagas || {};
  let saldo = imovel.financiamento?.saldoDevedor || 0;
  rows.forEach((r, i) => {
    const d = new Date(inicio); d.setMonth(d.getMonth() + i);
    const mesKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (d <= hoje) {
      const pg = pagas[mesKey];
      saldo = Math.max(0, saldo - (pg ? (pg.amort ?? r.amort) : r.amort));
    }
  });
  return saldo;
}

// Saldo atual: recalcula do zero, mês a mês, até hoje
// - Meses pagos: abate valor real do boleto + especiais pagas
// - Meses não pagos mas já vencidos: aplica juros + desconta estimativa
function calcSaldoAtualConstrutora(imovel) {
  const fin = imovel.financiamento;
  const valorContrato = fin.valorContrato || imovel.precoAquisicao || 0;
  const entrada = fin.entrada || 0;
  const taxaMensal = (fin.jurosCompensatorios != null && fin.jurosCompensatorios !== '' ? parseFloat(fin.jurosCompensatorios) : 1) / 100;
  const parcelaProjEstimada = fin.parcelaMensalEstimada || (valorContrato / Math.max(fin.prazoMeses || 1, 1));
  const inicio = new Date((fin.dataInicio || imovel.dataAquisicao || getMesAtual()) + '-02');
  const hoje = getHoje();
  const pagas = imovel.parcelasMensaisPagas || {};
  const prazoMeses = fin.prazoMeses || 0;

  // Mapa de especiais por mês
  const especiaisPorMes = {};
  (imovel.parcelasEspeciais || []).forEach(p => {
    if (!especiaisPorMes[p.data]) especiaisPorMes[p.data] = [];
    especiaisPorMes[p.data].push(p);
  });

  let saldo = valorContrato - entrada;

  for (let i = 0; i < prazoMeses; i++) {
    const d = new Date(inicio); d.setMonth(d.getMonth() + i);
    if (d > hoje) break; // só até o mês atual
    const mesKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const pg = pagas[mesKey];
    const especiaisMes = especiaisPorMes[mesKey] || [];

    if (pg) {
      // Pago: abate boleto + especiais pagas do mês
      const especiaisPagas = especiaisMes.filter(e => e.pago).reduce((s, e) => s + e.valor, 0);
      saldo = Math.max(0, saldo - pg.valorPago - especiaisPagas);
    } else {
      // Não pago: aplica juros compensatórios + desconta parcela estimada + especiais
      const totalEspeciais = especiaisMes.reduce((s, e) => s + e.valor, 0);
      saldo = Math.max(0, (saldo * (1 + taxaMensal)) - parcelaProjEstimada - totalEspeciais);
    }
  }
  return saldo;
}

// Total pago real (construtora) ou projetado (banco)
function calcTotalPagoConstrutora(imovel) {
  const fin = imovel.financiamento;
  const entrada = fin?.entrada || 0;
  const mensais = Object.values(imovel.parcelasMensaisPagas || {})
    .reduce((s, p) => s + (p.valorPago || 0), 0);
  const especiais = (imovel.parcelasEspeciais || [])
    .filter(p => p.pago).reduce((s, p) => s + p.valor, 0);
  return entrada + mensais + especiais;
}

function calcTotalJurosPagos(imovel, ateData) {
  if (isConstrutora(imovel)) return { totalJuros: 0, totalParcelas: calcTotalPagoConstrutora(imovel) };
  const rows = gerarAmortizacao(imovel);
  const inicio = new Date(imovel.financiamento?.dataInicio || imovel.dataAquisicao);
  const ate = new Date(ateData || getHoje());
  let totalJuros = 0, totalParcelas = 0;
  rows.forEach((r, i) => {
    const d = new Date(inicio); d.setMonth(d.getMonth() + i);
    if (d <= ate) { totalJuros += r.juros; totalParcelas += r.parcela; }
  });
  return { totalJuros, totalParcelas };
}

// Retorna parcelas mensais para o fluxo de caixa (pagas e projetadas)
function getParcelasMensaisFluxo(imovel) {
  const rows = gerarAmortizacao(imovel);
  const inicio = new Date((imovel.financiamento?.dataInicio || imovel.dataAquisicao || getMesAtual()) + '-02');
  const pagas = imovel.parcelasMensaisPagas || {};
  return rows.map((r, i) => {
    const d = new Date(inicio); d.setMonth(d.getMonth() + i);
    const mesKey = r.mesKey || `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const pg = pagas[mesKey];
    return {
      mes: mesKey,
      parcela: pg ? pg.valorPago : r.parcela,
      amort: pg ? (pg.amort ?? r.amort) : r.amort,
      juros: pg ? (pg.juros ?? r.juros) : r.juros,
      saldo: r.saldo, pago: !!pg, projetado: !pg,
      imovelId: imovel.id, imovelNome: imovel.nome
    };
  });
}

function calcCustoTotalAcumulado(imovel) {
  const aqs = imovel.precoAquisicao || 0;
  const { totalParcelas } = calcTotalJurosPagos(imovel);
  const lancamentos = (state.lancamentos || [])
    .filter(l => l.imovelId === imovel.id && l.tipo === 'saida')
    .reduce((s, l) => s + (l.valor || 0), 0);
  const especiais = (imovel.parcelasEspeciais || []).reduce((s, p) => s + p.valor, 0);
  return aqs + totalParcelas + lancamentos + especiais;
}

function calcValorizacaoMinima(imovel, anos) {
  const custo = calcCustoTotalAcumulado(imovel);
  const vm = imovel.valorMercado || imovel.precoAquisicao || 0;
  if (!anos || anos <= 0 || !custo || !vm) return null;
  return (Math.pow(custo / vm, 1 / anos) - 1) * 100;
}

function calcPatrimonioLiquido() {
  return state.imoveis.reduce((s, im) => {
    const vm = im.valorMercado || im.precoAquisicao || 0;
    return s + vm - calcSaldoAtual(im);
  }, 0);
}

function calcEndividamentoTotal() {
  const totalVM = state.imoveis.reduce((s, im) => s + (im.valorMercado || im.precoAquisicao || 0), 0);
  const totalDivida = state.imoveis.reduce((s, im) => s + calcSaldoAtual(im), 0);
  return totalVM > 0 ? (totalDivida / totalVM) * 100 : 0;
}

function showPage(page) {
  state.currentPage = page;

    fluxo: 'Fluxo de caixa',
    analise: 'Análise de viabilidade',
    config: 'Configurações'
  };
  document.getElementById('page-title').textContent = titles[page] || '';
  const renders = { dashboard: renderDashboard, imoveis: renderImoveis, financiamento: renderFinanciamento, fluxo: renderFluxo, analise: renderAnalise, config: renderConfig };
  (renders[page] || (() => {}))();
}

      </div>
      <div class="form-group" id="f-taxa-wrap">
        <label>Taxa de juros anual (%)</label>
        <input id="f-taxa" placeholder="Ex: 8.5" value="${im?.financiamento?.taxaJurosAnual || ''}">
      </div>
      <div class="form-group" id="f-prazo-wrap">
        <label>Prazo total (meses)</label>
        <input id="f-prazo" placeholder="Ex: 240" value="${im?.financiamento?.prazoMeses || ''}">

      <div class="form-group" id="f-sistema-wrap">

      </div>

        <input id="f-parcest" placeholder="Ex: 3800" value="${im?.financiamento?.parcelaMensalEstimada || ''}">

      <div class="form-group hidden" id="f-indice-wrap">
        <label>Índice de correção</label>
        <select id="f-indice">
          <option value="CUB/ES" ${im?.financiamento?.indiceCorrecao === 'CUB/ES' ? 'selected' : ''}>CUB/ES</option>
          <option value="IGPM" ${im?.financiamento?.indiceCorrecao === 'IGPM' ? 'selected' : ''}>IGP-M</option>
          <option value="IPCA" ${im?.financiamento?.indiceCorrecao === 'IPCA' ? 'selected' : ''}>IPCA</option>
          <option value="Nenhum" ${im?.financiamento?.indiceCorrecao === 'Nenhum' ? 'selected' : ''}>Nenhum</option>
        </select>
      </div>
      <div class="form-group hidden" id="f-jurospos-wrap">
        <label>Juros compensatórios pós-habite-se (% a.m.)</label>
        <input id="f-jurospos" placeholder="Ex: 1" value="${im?.financiamento?.jurosCompensatorios || ''}">
        <span class="form-hint">Taxa que passa a vigorar após entrega das chaves</span>
      </div>

      <div class="form-group" id="f-inicio-wrap">

  `;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="salvarImovel('${id || ''}')">Salvar imóvel</button>
  `;

  openModal();

function toggleFinanciamento() {
  const tipo = document.getElementById('f-fin-tipo')?.value;
  const bancoFields = ['f-saldo-wrap','f-taxa-wrap','f-prazo-wrap','f-sistema-wrap'];
  const constFields = ['f-vcontrato-wrap','f-nparcelas-wrap','f-parcest-wrap','f-indice-wrap','f-jurospos-wrap'];
  const commonFields = ['f-credor-wrap','f-entrada-wrap','f-inicio-wrap'];
  [...bancoFields,...constFields,...commonFields].forEach(id => {
    document.getElementById(id)?.classList.add('hidden');
  });
  if (tipo === 'banco') {
    [...bancoFields,...commonFields].forEach(id => document.getElementById(id)?.classList.remove('hidden'));
  } else if (tipo === 'construtora') {
    [...constFields,...commonFields].forEach(id => document.getElementById(id)?.classList.remove('hidden'));
  }
}

function salvarImovel(id) {
  const nome = document.getElementById('f-nome').value.trim();
  if (!nome) { alert('Informe o nome do imóvel'); return; }
  const finTipo = document.getElementById('f-fin-tipo').value;
  let financiamento = null;
  if (finTipo === 'banco') {
    const taxaAnual = parseFloat(document.getElementById('f-taxa').value) || 0;
    financiamento = {
      tipo: 'banco',
      credor: document.getElementById('f-credor').value,
      entrada: parseFloat(document.getElementById('f-entrada').value) || 0,
      saldoDevedor: parseFloat(document.getElementById('f-saldo').value) || 0,
      taxaJurosAnual: taxaAnual,
      taxaJurosMensal: taxaAnual / 12,
      prazoMeses: parseInt(document.getElementById('f-prazo').value) || 0,
      sistema: document.getElementById('f-sistema').value,
      dataInicio: document.getElementById('f-inicio').value,
    };
  } else if (finTipo === 'construtora') {
    financiamento = {
      tipo: 'construtora',
      credor: document.getElementById('f-credor').value,
      entrada: parseFloat(document.getElementById('f-entrada').value) || 0,
      valorContrato: parseFloat(document.getElementById('f-vcontrato').value) || 0,
      prazoMeses: parseInt(document.getElementById('f-nparcelas').value) || 0,
      parcelaMensalEstimada: parseFloat(document.getElementById('f-parcest').value) || 0,
      indiceCorrecao: document.getElementById('f-indice').value,
      jurosCompensatorios: parseFloat(document.getElementById('f-jurospos').value) || 0,
      dataInicio: document.getElementById('f-inicio').value,
    };
  }
  const obj = {
    id: id || Date.now().toString(),
    nome,
    empreendimento: document.getElementById('f-empreendimento').value,
    tipo: document.getElementById('f-tipo').value,
    dataAquisicao: document.getElementById('f-data').value,
    precoAquisicao: parseFloat(document.getElementById('f-preco').value) || 0,
    valorMercado: parseFloat(document.getElementById('f-vm').value) || 0,
    obs: document.getElementById('f-obs').value,
    financiamento
  };
  // Preserve existing pagamentos when editing
  if (id) {
    const existing = state.imoveis.find(i => i.id === id);
    if (existing) {
      obj.parcelasMensaisPagas = existing.parcelasMensaisPagas || {};
      obj.parcelasEspeciais = existing.parcelasEspeciais || [];
    }
    const idx = state.imoveis.findIndex(i => i.id === id);
    if (idx >= 0) state.imoveis[idx] = obj;
  } else {
    obj.parcelasMensaisPagas = {};
    obj.parcelasEspeciais = [];
    state.imoveis.push(obj);
  }
  save(); closeModal(); renderImoveis();
}

function deletarImovel(id) {
  if (!confirm('Excluir este imóvel? Todos os lançamentos associados também serão removidos.')) return;
  state.imoveis = state.imoveis.filter(i => i.id !== id);
  state.lancamentos = state.lancamentos.filter(l => l.imovelId !== id);
  save();
  renderImoveis();
}

function calcSaldoAposNMeses(imovel, n) {
  if (isConstrutora(imovel)) {
    const fin = imovel.financiamento;
    const valorContrato = fin.valorContrato || imovel.precoAquisicao || 0;
    const entrada = fin.entrada || 0;
    const rows = gerarAmortizacao(imovel);
    let saldo = valorContrato - entrada;
    for (let i = 0; i < Math.min(n, rows.length); i++) {
      saldo = Math.max(0, saldo - rows[i].amort);
    }
    return saldo;
  }
  const rows = gerarAmortizacao(imovel);
  const inicio = new Date((imovel.financiamento?.dataInicio || imovel.dataAquisicao || getMesAtual()) + '-02');
  const pagas = imovel.parcelasMensaisPagas || {};
  let saldo = imovel.financiamento?.saldoDevedor || 0;
  for (let i = 0; i < Math.min(n, rows.length); i++) {
    const d = new Date(inicio); d.setMonth(d.getMonth() + i);
    const mesKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const pg = pagas[mesKey];
    saldo = Math.max(0, saldo - (pg ? (pg.amort ?? rows[i].amort) : rows[i].amort));
  }
  return saldo;
}

function openModalMarcarPago(imovelId, mesKey, parcelaPrev, amortPrev, jurosPrev) {
  const im = state.imoveis.find(i => i.id === imovelId);
  const construtora = im && isConstrutora(im);
  const [ano, mes] = mesKey.split('-');
  const mesesNomes = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const dataFmt = `${mesesNomes[parseInt(mes)-1]}/${ano}`;
  document.getElementById('modal-title').textContent = `Registrar pagamento — ${dataFmt}`;
  document.getElementById('modal-body').innerHTML = `
    <div class="alert alert-info" style="margin-bottom:16px">
      Confirme ou ajuste o valor real pago. O saldo devedor e o fluxo de caixa serão atualizados automaticamente.
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>Valor total pago (R$)</label>
        <input id="mp-valor" type="number" step="0.01" value="${parcelaPrev.toFixed(2)}">
        <span class="form-hint">Valor estimado: ${fmtBRL(parcelaPrev)}</span>
      </div>
      <div class="form-group">
        <label>Data do pagamento</label>
        <input type="date" id="mp-data" value="${getHoje().toISOString().slice(0,10)}">
      </div>
      ${construtora ? '' : `
      <div class="form-group">
        <label>Amortização real (R$)</label>
        <input id="mp-amort" type="number" step="0.01" value="${amortPrev.toFixed(2)}">
        <span class="form-hint">Estimado: ${fmtBRL(amortPrev)}</span>
      </div>
      <div class="form-group">
        <label>Juros reais (R$)</label>
        <input id="mp-juros" type="number" step="0.01" value="${jurosPrev.toFixed(2)}">
        <span class="form-hint">Estimado: ${fmtBRL(jurosPrev)}</span>
      </div>`}
      <div class="form-group form-full">
        <label>Observação (opcional)</label>
        <input id="mp-obs" placeholder="Ex: Valor corrigido pelo CUB, desconto obtido...">
      </div>
    </div>`;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="marcarParcelaPaga('${imovelId}','${mesKey}',${construtora})">Confirmar pagamento</button>`;
  openModal();
}

function marcarParcelaPaga(imovelId, mesKey, construtora) {
  const im = state.imoveis.find(i => i.id === imovelId);
  if (!im) return;
  if (!im.parcelasMensaisPagas) im.parcelasMensaisPagas = {};
  const valorPago = parseFloat(document.getElementById('mp-valor').value) || 0;
  im.parcelasMensaisPagas[mesKey] = {
    valorPago,
    amort: construtora ? valorPago : (parseFloat(document.getElementById('mp-amort').value) || 0),
    juros: construtora ? 0 : (parseFloat(document.getElementById('mp-juros').value) || 0),
    dataPagamento: document.getElementById('mp-data').value,
    obs: document.getElementById('mp-obs').value
  };
  save(); closeModal(); renderFinanciamento();
}

function desmarcarParcela(imovelId, mesKey) {
  if (!confirm('Desfazer o registro deste pagamento?')) return;
  const im = state.imoveis.find(i => i.id === imovelId);
  if (!im || !im.parcelasMensaisPagas) return;
  delete im.parcelasMensaisPagas[mesKey];
  save();
  renderFinanciamento();
}

function salvarTaxaJuros(imovelId) {
  const im = state.imoveis.find(i => i.id === imovelId);
  if (!im || !im.financiamento) return;
  const val = parseFloat(document.getElementById(`taxa-edit-${imovelId}`)?.value);
  if (isNaN(val) || val < 0) { alert('Informe uma taxa válida'); return; }
  im.financiamento.jurosCompensatorios = val;
  save();
  renderFinanciamento();
}

// ─── FINANCIAMENTO ────────────────────────────────────────────────────────────

              especiais.forEach(p => { mesesComEspecial[p.data] = p; });
              const mesesNomes = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
              const pagas = im.parcelasMensaisPagas || {};
              const hoje = getHoje();
              return amort.map((r, i) => {
                const d = new Date(inicio); d.setMonth(d.getMonth() + i);
                const mesKey = r.mesKey || `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                const dataFmt = `${mesesNomes[d.getMonth()]}/${d.getFullYear()}`;
                const esp = mesesComEspecial[mesKey];
                const pgto = pagas[mesKey];
                const isPago = !!pgto;
                const isFuturo = d > hoje;
                const parcelaExibida = isPago ? pgto.valorPago : r.parcela;
                const totalMes = parcelaExibida + (esp ? esp.valor : 0);
                const saldoExibido = r.saldoApos !== undefined ? r.saldoApos : calcSaldoAposNMeses(im, i + 1);

                let rowBg = '';
                if (isPago) rowBg = 'background:var(--success-light);';
                else if (esp && !isFuturo) rowBg = 'background:var(--warning-light);';
                else if (isFuturo) rowBg = 'opacity:0.65;';

                const statusCell = isPago
                  ? `<span class="tag tag-ok" style="font-size:10px">✓ Pago</span>`
                  : isFuturo
                  ? `<span class="tag" style="font-size:10px;background:var(--surface2);color:var(--text3)">Projetado</span>`
                  : `<span class="tag tag-danger" style="font-size:10px">Pendente</span>`;

                const extraCols = isConstrutora(im)
                  ? `<td class="td-right td-mono color-danger" title="Juros compensatórios 1% a.m. projetados">${r.pago ? '—' : fmtBRL(r.jurosProjetados||0)}</td>`
                  : `<td class="td-right td-mono color-success">${fmtBRL(isPago ? (pgto.amort ?? r.amort) : r.amort)}</td>
                     <td class="td-right td-mono color-danger">${fmtBRL(isPago ? (pgto.juros ?? r.juros) : r.juros)}</td>`;

                return `<tr style="${rowBg}">
                  <td style="color:var(--text3);font-size:12px">${r.mes}</td>
                  <td class="td-mono" style="font-weight:500">${dataFmt}</td>
                  <td>${esp ? `<span class="tag tag-warn" style="font-size:10px">${tipoLabel[esp.tipo]||esp.tipo}</span>` : ''}</td>
                  <td class="td-right td-mono">${fmtBRL(parcelaExibida)}</td>
                  <td class="td-right td-mono" style="color:${esp?'var(--warning)':'var(--text3)'}">
                    ${esp ? `<strong>${fmtBRL(esp.valor)}</strong>` : '—'}
                  </td>
                  <td class="td-right td-mono fw-600">${fmtBRL(totalMes)}</td>
                  ${extraCols}
                  <td class="td-right td-mono">${fmtBRL(saldoExibido)}</td>
                  <td>${statusCell}</td>
                  <td>
                    ${isPago
                      ? `<button class="btn btn-ghost btn-sm" onclick="desmarcarParcela('${im.id}','${mesKey}')">Desfazer</button>`
                      : `<button class="btn btn-primary btn-sm" onclick="openModalMarcarPago('${im.id}','${mesKey}',${r.parcela},${r.amort||0},${r.juros||0})">Marcar pago</button>`}
                  </td>
                </tr>`;
              }).join('');
            })()}
          </tbody>
        </table>
      </div>
      <div style="display:flex;gap:16px;padding:12px 0;font-size:12px;color:var(--text3)">
        <span>Total: ${amort.length} parcelas mensais</span>
        <span>·</span>
        <span style="color:var(--warning)">${especiais.length} parcela${especiais.length !== 1?'s':''} especia${especiais.length !== 1?'is':'l'} integrada${especiais.length !== 1?'s':''}</span>
      </div>
    </div>`;
  });

  c.innerHTML = html;
}

function getSaidasFinanciamentoMes(mes) {
  const auto = [];
  state.imoveis.forEach(im => {
    if (!im.financiamento) return;
    const parcelas = getParcelasMensaisFluxo(im);
    const p = parcelas.find(x => x.mes === mes);
    if (p) {
      auto.push({
        id: `fin_mensal_${im.id}_${mes}`,
        tipo: 'saida', mes,
        descricao: `Parcela mensal — ${im.nome}`,
        valor: p.parcela,
        imovelId: im.id,
        origem: p.pago ? 'financiamento_pago' : 'financiamento_projetado',
        detalhe: `Amort: ${fmtBRL(p.amort)} | Juros: ${fmtBRL(p.juros)}`
      });
    }
    (im.parcelasEspeciais || []).filter(pe => pe.data === mes).forEach(pe => {
      auto.push({
        id: `fin_esp_${pe.id}`,
        tipo: 'saida', mes,
        descricao: `${pe.descricao || pe.tipo} — ${im.nome}`,
        valor: pe.valor,
        imovelId: im.id,
        origem: pe.pago ? 'financiamento_pago' : 'financiamento_projetado'
      });
    });
  });
  return auto;
}

function renderAnalise() {
  document.getElementById('topbar-actions').innerHTML = '';
  const c = document.getElementById('content');

  if (state.imoveis.length === 0) {
    c.innerHTML = `<div class="card"><div class="empty"><div class="empty-icon">📊</div><h3>Sem imóveis para analisar</h3><button class="btn btn-primary" onclick="showPage('imoveis')">Cadastrar imóvel</button></div></div>`;
    return;
  }

  let html = `<div class="alert alert-info">Selecione um imóvel e o horizonte de tempo para ver a análise de viabilidade da venda.</div>
  <div class="card mb-16">
    <div class="form-grid" style="grid-template-columns:1fr 1fr 1fr 1fr">
      <div class="form-group">
        <label>Imóvel</label>
        <select id="an-imovel" onchange="calcularAnalise()">
          ${state.imoveis.map(im => `<option value="${im.id}">${im.nome}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Vender em (anos)</label>
        <select id="an-anos" onchange="calcularAnalise()">
          ${[1,2,3,5,7,10,15,20].map(a => `<option value="${a}" ${a === 5 ? 'selected' : ''}>${a} ano${a > 1 ? 's' : ''}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Valorização anual estimada (%)</label>
        <input id="an-val" type="number" step="0.5" value="8" onchange="calcularAnalise()" placeholder="Ex: 8">
      </div>
      <div class="form-group">
        <label>CDI para comparação (%/a.a.)</label>
        <input id="an-cdi" type="number" step="0.5" value="13" onchange="calcularAnalise()" placeholder="Ex: 13">
        <span class="form-hint">Taxa CDI bruta atual para benchmark</span>
      </div>
    </div>
  </div>
  <div id="analise-resultado"></div>`;

  c.innerHTML = html;
  calcularAnalise();
}

function calcularAnalise() {
  const imId = document.getElementById('an-imovel')?.value;
  const anos = parseInt(document.getElementById('an-anos')?.value) || 5;
  const valorAnual = parseFloat(document.getElementById('an-val')?.value) || 0;
  const cdiAnual = parseFloat(document.getElementById('an-cdi')?.value) || 13;
  const im = state.imoveis.find(i => i.id === imId);
  if (!im) return;

  const vm = im.valorMercado || im.precoAquisicao || 0;
  const fin = im.financiamento;
  const valorFuturo = vm * Math.pow(1 + valorAnual / 100, anos);

  // Data futura da venda
  const hoje = getHoje();
  const dataVenda = new Date(hoje);
  dataVenda.setFullYear(dataVenda.getFullYear() + anos);
  const mesVenda = `${dataVenda.getFullYear()}-${String(dataVenda.getMonth()+1).padStart(2,'0')}`;

  // Data de início do investimento
  const dataInicio = new Date((fin?.dataInicio || im.dataAquisicao || getMesAtual()) + '-02');
  const mesesInvestidos = Math.round((dataVenda - dataInicio) / (1000 * 60 * 60 * 24 * 30.44));
  const anosInvestidos = mesesInvestidos / 12;

  let custoTotal = 0, saldoNaVenda = 0, totalJuros = 0, detalheCusto = [];

  if (isConstrutora(im)) {
    const entrada = fin?.entrada || 0;
    const valorContrato = fin?.valorContrato || im.precoAquisicao || 0;
    const prazoMeses = fin?.prazoMeses || 0;
    const taxaMensal = (fin?.jurosCompensatorios != null ? parseFloat(fin.jurosCompensatorios) : 1) / 100;
    const parcelaProjEstimada = fin?.parcelaMensalEstimada || (valorContrato / Math.max(prazoMeses, 1));
    const inicio = new Date((fin?.dataInicio || im.dataAquisicao || getMesAtual()) + '-02');
    const pagas = im.parcelasMensaisPagas || {};

    // Mensais: só até o prazo do contrato OU data de venda (o que vier primeiro)
    let totalMensais = 0, mesesContados = 0;
    for (let i = 0; i < prazoMeses; i++) {
      const d = new Date(inicio); d.setMonth(d.getMonth() + i);
      const mesKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if (mesKey > mesVenda) break;
      const pg = pagas[mesKey];
      totalMensais += pg ? pg.valorPago : parcelaProjEstimada;
      mesesContados++;
    }

    // Especiais: filtra por imovelId E data <= mesVenda
    const totalEspeciais = (im.parcelasEspeciais || [])
      .filter(e => e.data <= mesVenda)
      .reduce((s, e) => s + e.valor, 0);

    const despesas = (state.lancamentos || [])
      .filter(l => l.imovelId === im.id && l.tipo === 'saida')
      .reduce((s, l) => s + l.valor, 0);

    custoTotal = entrada + totalMensais + totalEspeciais + despesas;

    // Saldo devedor na venda: simula mês a mês
    let saldo = valorContrato - entrada;
    for (let i = 0; i < prazoMeses; i++) {
      const d = new Date(inicio); d.setMonth(d.getMonth() + i);
      const mesKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if (mesKey > mesVenda) break;
      const pg = pagas[mesKey];
      const especiaisMes = (im.parcelasEspeciais || [])
        .filter(e => e.data === mesKey).reduce((s, e) => s + e.valor, 0);
      if (pg) {
        saldo = Math.max(0, saldo - pg.valorPago - especiaisMes);
      } else {
        saldo = Math.max(0, (saldo * (1 + taxaMensal)) - parcelaProjEstimada - especiaisMes);
      }
    }
    saldoNaVenda = saldo;

    detalheCusto = [
      { label: 'Entrada paga', valor: entrada },
      { label: `Parcelas mensais (${mesesContados} de ${prazoMeses} meses)`, valor: totalMensais },
      { label: 'Parcelas especiais no período', valor: totalEspeciais },
      ...(despesas > 0 ? [{ label: 'Despesas extras lançadas', valor: despesas }] : []),
    ];

  } else {
    // BANCO
    const { totalJuros: tj } = calcTotalJurosPagos(im, dataVenda.toISOString());
    totalJuros = tj;
    const amort = gerarAmortizacao(im);
    const inicio = new Date((fin?.dataInicio || im.dataAquisicao || getMesAtual()) + '-02');
    let saldo = fin?.saldoDevedor || 0;
    amort.forEach((r, i) => {
      const d = new Date(inicio); d.setMonth(d.getMonth() + i);
      if (d <= dataVenda) saldo = Math.max(0, saldo - r.amort);
    });
    saldoNaVenda = saldo;
    const aqs = im.precoAquisicao || 0;
    const despesas = (state.lancamentos || [])
      .filter(l => l.imovelId === im.id && l.tipo === 'saida')
      .reduce((s, l) => s + l.valor, 0);
    custoTotal = aqs + totalJuros + despesas;
    detalheCusto = [
      { label: 'Preço de aquisição', valor: aqs },
      { label: 'Total de juros ao banco', valor: totalJuros },
      ...(despesas > 0 ? [{ label: 'Despesas extras', valor: despesas }] : []),
    ];
  }

  const receitaLiquida = valorFuturo - saldoNaVenda;
  const lucro = receitaLiquida - custoTotal;
  const roi = custoTotal > 0 ? (lucro / custoTotal) * 100 : 0;
  const roiAnual = anosInvestidos > 0 ? (Math.pow(1 + roi / 100, 1 / anosInvestidos) - 1) * 100 : 0;
  const valMin = custoTotal > 0 && vm > 0 ? (Math.pow(custoTotal / vm, 1 / anosInvestidos) - 1) * 100 : null;

  // Comparação CDI: quanto renderia o custo total aplicado no CDI pelo mesmo período
  const rendimentoCDI = custoTotal * (Math.pow(1 + cdiAnual / 100, anosInvestidos) - 1);
  const lucroLiquidoVsRenda = lucro - rendimentoCDI;
  const cdiMelhor = lucroLiquidoVsRenda < 0;

  const res = document.getElementById('analise-resultado');
  if (!res) return;
  res.innerHTML = `
    <div style="background:var(--surface2);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;display:flex;gap:24px;flex-wrap:wrap;font-size:13px">
      <span>📅 Início do investimento: <strong>${dataInicio.toLocaleDateString('pt-BR',{month:'short',year:'numeric'})}</strong></span>
      <span>📅 Data de venda projetada: <strong>${dataVenda.toLocaleDateString('pt-BR',{month:'short',year:'numeric'})}</strong></span>
      <span>⏱ Tempo total investido: <strong>${Math.floor(anosInvestidos)} anos e ${Math.round((anosInvestidos % 1) * 12)} meses (${mesesInvestidos} meses)</strong></span>
    </div>

    <div class="two-col" style="margin-bottom:16px">
      <div class="card">
        <div class="card-title" style="margin-bottom:16px">Projeção de venda em ${anos} ano${anos > 1 ? 's' : ''}</div>
        <div style="display:flex;flex-direction:column;gap:0">
          <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
            <span class="color-muted">Valor atual de mercado</span>
            <span class="fw-600 text-mono">${fmtBRL(vm)}</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
            <span class="color-muted">Valor futuro estimado (${valorAnual}%/a.a.)</span>
            <span class="fw-600 text-mono">${fmtBRL(valorFuturo)}</span>
          </div>
          ${saldoNaVenda > 0 ? `
          <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
            <span class="color-muted">(-) Saldo devedor na venda</span>
            <span class="fw-600 text-mono color-danger">- ${fmtBRL(saldoNaVenda)}</span>
          </div>` : ''}
          <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
            <span class="color-muted">Receita líquida da venda</span>
            <span class="fw-600 text-mono">${fmtBRL(receitaLiquida)}</span>
          </div>
          <div style="padding:10px 0;border-bottom:1px solid var(--border)">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px">
              <span class="color-muted fw-600">(-) Custo total acumulado</span>
              <span class="fw-600 text-mono color-danger">- ${fmtBRL(custoTotal)}</span>
            </div>
            ${detalheCusto.filter(d => d.valor > 0).map(d => `
              <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3);padding:2px 0 2px 12px">
                <span>${d.label}</span><span class="text-mono">${fmtBRL(d.valor)}</span>
              </div>`).join('')}
          </div>
          <div style="display:flex;justify-content:space-between;padding:14px 12px;margin-top:4px;background:${lucro >= 0 ? 'var(--success-light)' : 'var(--danger-light)'};border-radius:var(--radius-sm)">
            <span style="font-weight:600;color:${lucro >= 0 ? 'var(--success)' : 'var(--danger)'}">Lucro / Prejuízo</span>
            <span style="font-weight:700;font-family:var(--mono);font-size:18px;color:${lucro >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmtBRL(lucro)}</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title" style="margin-bottom:16px">Indicadores do investimento</div>
        <div style="display:flex;flex-direction:column;gap:14px">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div>
              <div class="metric-label">ROI total</div>
              <div class="metric-value ${roi >= 0 ? 'metric-pos' : 'metric-neg'}" style="font-size:20px">${fmtPct(roi)}</div>
            </div>
            <div>
              <div class="metric-label">ROI anualizado</div>
              <div class="metric-value ${roiAnual >= 0 ? 'metric-pos' : 'metric-neg'}" style="font-size:20px">${fmtPct(roiAnual)}/a.a.</div>
            </div>
          </div>
          ${!isConstrutora(im) ? `<div><div class="metric-label">Total de juros pagos ao banco</div><div class="metric-value metric-neg">${fmtBRL(totalJuros)}</div></div>` : ''}
          <div class="divider"></div>
          <div>
            <div class="metric-label">Valorização mínima para ponto de equilíbrio</div>
            <div class="metric-value ${valMin !== null && valMin > 12 ? 'metric-neg' : valMin !== null && valMin > 8 ? 'metric-warn' : 'metric-pos'}">
              ${valMin !== null ? (valMin < 0 ? '0%/a.a. (já lucrativo)' : '+' + fmtPct(valMin) + '/a.a.') : '—'}
            </div>
            <div class="metric-sub">abaixo disso o investimento dá prejuízo</div>
          </div>
          <div class="${valorAnual >= (valMin || 0) ? 'alert alert-info' : 'alert alert-warn'}" style="margin-bottom:0">
            ${valMin !== null && valMin <= 0
              ? `Mesmo sem valorização, o investimento já é lucrativo.`
              : valorAnual >= (valMin || 0)
              ? `Com ${valorAnual}%/a.a., o investimento é lucrativo.`
              : `Com ${valorAnual}%/a.a., precisa de pelo menos ${fmtPct(valMin||0)}/a.a. para empatar.`}
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title" style="margin-bottom:16px">Comparação com CDI — e se tivesse deixado no renda fixa?</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px">
        <div>
          <div class="metric-label">Capital investido (custo total)</div>
          <div class="fw-600 text-mono" style="font-size:16px">${fmtBRL(custoTotal)}</div>
        </div>
        <div>
          <div class="metric-label">Lucro no imóvel</div>
          <div class="fw-600 text-mono ${lucro >= 0 ? 'color-success' : 'color-danger'}" style="font-size:16px">${fmtBRL(lucro)}</div>
        </div>
        <div>
          <div class="metric-label">Rendimento CDI (${cdiAnual}%/a.a. × ${Math.floor(anosInvestidos)}a ${Math.round((anosInvestidos%1)*12)}m)</div>
          <div class="fw-600 text-mono color-warn" style="font-size:16px">${fmtBRL(rendimentoCDI)}</div>
        </div>
      </div>
      <div style="padding:14px 16px;border-radius:var(--radius-sm);background:${cdiMelhor ? 'var(--warning-light)' : 'var(--success-light)'}">
        <div style="font-weight:600;font-size:14px;color:${cdiMelhor ? 'var(--warning)' : 'var(--success)'}">
          ${cdiMelhor
            ? `📊 O CDI teria rendido ${fmtBRL(rendimentoCDI - lucro)} a mais do que o imóvel neste cenário.`
            : `🏠 O imóvel superou o CDI em ${fmtBRL(lucroLiquidoVsRenda)} neste cenário.`}
        </div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px">
          Comparação considera ${fmtPct(cdiAnual)}/a.a. de CDI bruto por ${mesesInvestidos} meses. Ajuste a taxa abaixo conforme o CDI atual.
        </div>
      </div>
    </div>`;
}

async function salvarConfig() {
  const gistId = document.getElementById('cfg-gist').value.trim();
  const msg = document.getElementById('cfg-msg');
  if (!state.gistToken) { msg.textContent = 'Token não encontrado. Faça login novamente.'; msg.style.color = 'var(--danger)'; return; }
  msg.textContent = 'Conectando...'; msg.style.color = 'var(--text2)';
  try {
    let id = gistId;
    if (!id) {
      id = await createGist(state.gistToken);
      msg.textContent = `Gist criado! ID: ${id}`;
    }
    state.gistId = id;
    saveLocal();
    await saveGist();
    msg.textContent = '✓ Conectado e sincronizado!';
    msg.style.color = 'var(--success)';
    updateGistStatus();
    renderConfig();
  } catch(e) {
    msg.textContent = 'Erro: ' + e.message;
    msg.style.color = 'var(--danger)';
  }
}

async function carregarGist() {
  const msg = document.getElementById('cfg-msg');
  msg.textContent = 'Carregando...'; msg.style.color = 'var(--text2)';
  const ok = await loadGist();
  if (ok) { msg.textContent = '✓ Dados carregados!'; msg.style.color = 'var(--success)'; renderConfig(); }
  else { msg.textContent = 'Erro ao carregar. Verifique o token e o ID.'; msg.style.color = 'var(--danger)'; }
}

function exportarJSON() {
  const data = JSON.stringify({ imoveis: state.imoveis, lancamentos: state.lancamentos }, null, 2);
  const a = document.createElement('a');
  a.href = 'data:application/json,' + encodeURIComponent(data);
  a.download = 'patrimonio_imoveis.json';
  a.click();
}

function limparDados() {
  if (!confirm('Limpar TODOS os dados? Esta ação não pode ser desfeita.')) return;
  state.imoveis = []; state.lancamentos = [];
  save(); renderConfig();
}

// ─── AUTENTICAÇÃO POR SENHA ────────────────────────────────────────────────
const ENCRYPTED_TOKEN = 'cfd85e9461d514f2c2b3a9c08a803d4b:0217dfc768692afc263546ee57aafd3e135a6c2b00921bec2055b7e821926c263eb964565db5c0a83e13e8a3662ab120';
const SALT = 'patrimonio_imoveis_salt_2024';
const GIST_ID = '408a0e3337b641c84fcaa85aa148c00e';

async function deriveKey(senha) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(senha), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: enc.encode(SALT), iterations: 100000, hash: 'SHA-256' },
    keyMaterial, { name: 'AES-CBC', length: 256 }, false, ['decrypt']
  );
}

async function decryptToken(senha) {
  try {
    const [ivHex, encHex] = ENCRYPTED_TOKEN.split(':');
    const iv = new Uint8Array(ivHex.match(/../g).map(h => parseInt(h, 16)));
    const enc = new Uint8Array(encHex.match(/../g).map(h => parseInt(h, 16)));
    const key = await deriveKey(senha);
    const dec = await crypto.subtle.decrypt({ name: 'AES-CBC', iv }, key, enc);
    return new TextDecoder().decode(dec);
  } catch { return null; }
}

async function tentarLoginAutomatico() {
  const senhaSalva = sessionStorage.getItem('pat_session');
  if (senhaSalva) {
    const token = await decryptToken(senhaSalva);
    if (token) {
      state.gistToken = token;
      state.gistId = GIST_ID;
      return true;
    }
  }
  return false;
}

function showLoginScreen() {
  document.getElementById('content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;min-height:60vh">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:100%;max-width:400px;text-align:center">
        <div style="font-size:32px;margin-bottom:16px">🏠</div>
        <h2 style="font-size:18px;font-weight:600;margin-bottom:8px">Patrimônio Imobiliário</h2>
        <p style="font-size:13px;color:var(--text2);margin-bottom:24px">Digite a senha para acessar o sistema</p>
        <div style="display:flex;flex-direction:column;gap:12px">
          <input id="login-senha" type="password" placeholder="Senha de acesso"
            style="padding:10px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;text-align:center;outline:none"
            onkeydown="if(event.key==='Enter') fazerLogin()">
          <button class="btn btn-primary" style="justify-content:center;padding:10px" onclick="fazerLogin()">Entrar</button>
          <div id="login-erro" style="font-size:13px;color:var(--danger);min-height:20px"></div>
        </div>
      </div>
    </div>`;
  setTimeout(() => document.getElementById('login-senha')?.focus(), 100);
}

async function fazerLogin() {
  const senha = document.getElementById('login-senha')?.value;
  const erro = document.getElementById('login-erro');
  if (!senha) { erro.textContent = 'Digite a senha'; return; }
  erro.textContent = 'Verificando...';
  const token = await decryptToken(senha);
  if (!token) { erro.textContent = 'Senha incorreta'; return; }
  sessionStorage.setItem('pat_session', senha);
  state.gistToken = token;
  state.gistId = GIST_ID;
  erro.textContent = 'Carregando dados do servidor...';
  const ok = await loadGist();
  if (!ok) {
    console.warn('loadGist falhou no login — usando dados locais');
  }
  updateGistStatus();
  showPage('dashboard');
}


// Sempre usa a hora de São Paulo via API, independente do PC ou fuso do navegador
let hoje = new Date(); // fallback imediato

function getHoje() { return hoje; }

function getMesAtual() {
  const d = getHoje();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

async function fetchDataHoje() {
  try {
    const r = await fetch('https://worldtimeapi.org/api/timezone/America/Sao_Paulo');
    if (!r.ok) throw new Error('API indisponível');
    const data = await r.json();
    hoje = new Date(data.datetime);
    console.log('Data sincronizada via WorldTimeAPI:', hoje.toLocaleString('pt-BR'));
  } catch(e) {
    console.warn('WorldTimeAPI indisponível, usando relógio local:', e.message);
    hoje = new Date(); // fallback para o relógio do navegador
  }
}

    </svg>
    <span style="font-size:13px">Carregando...</span>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;

fetchDataHoje().then(async () => {
  const logado = await tentarLoginAutomatico();
  if (logado) {
    const ok = await loadGist();
    if (!ok) console.warn('Auto-login: loadGist falhou, usando dados locais');
    updateGistStatus();
    showPage('dashboard');
  } else {
    showLoginScreen();
  }
});
